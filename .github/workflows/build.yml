name: Build Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux-x64:
    name: Build Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build binary
        run: |
          pyinstaller \
            --onefile \
            --name aimili-vpngate-linux-x64 \
            --hidden-import=vpn_utils \
            --hidden-import=proxy_server \
            --add-data "vpn_utils.py:." \
            --add-data "proxy_server.py:." \
            vpngate_manager.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aimili-vpngate-linux-x64
          path: dist/aimili-vpngate-linux-x64

  build-linux-aarch64:
    name: Build Linux aarch64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build binary
        run: |
          pyinstaller \
            --onefile \
            --name aimili-vpngate-linux-aarch64 \
            --hidden-import=vpn_utils \
            --hidden-import=proxy_server \
            --add-data "vpn_utils.py:." \
            --add-data "proxy_server.py:." \
            vpngate_manager.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aimili-vpngate-linux-aarch64
          path: dist/aimili-vpngate-linux-aarch64

  build-windows-x64:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build binary
        run: |
          pyinstaller `
            --onefile `
            --name aimili-vpngate-win64 `
            --hidden-import=vpn_utils `
            --hidden-import=proxy_server `
            --add-data "vpn_utils.py;." `
            --add-data "proxy_server.py;." `
            vpngate_manager.py
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aimili-vpngate-win64
          path: dist/aimili-vpngate-win64.exe

  release:
    name: Create GitHub Release
    needs: [build-linux-x64, build-linux-aarch64, build-windows-x64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/aimili-vpngate-linux-x64/aimili-vpngate-linux-x64 release/
          cp artifacts/aimili-vpngate-linux-aarch64/aimili-vpngate-linux-aarch64 release/
          cp artifacts/aimili-vpngate-win64/aimili-vpngate-win64.exe release/
          cd release
          chmod +x aimili-vpngate-linux-x64 aimili-vpngate-linux-aarch64
          tar czf aimili-vpngate-linux-x64.tar.gz aimili-vpngate-linux-x64
          tar czf aimili-vpngate-linux-aarch64.tar.gz aimili-vpngate-linux-aarch64
          zip aimili-vpngate-win64.zip aimili-vpngate-win64.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/aimili-vpngate-linux-x64.tar.gz
            release/aimili-vpngate-linux-aarch64.tar.gz
            release/aimili-vpngate-win64.zip
