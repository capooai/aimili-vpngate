name: Build Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-linux-x64:
    name: Build Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build binary
        run: |
          pyinstaller \
            --onefile \
            --name aimili-vpngate-linux-x64 \
            --hidden-import=vpn_utils \
            --hidden-import=proxy_server \
            --add-data "vpn_utils.py:." \
            --add-data "proxy_server.py:." \
            vpngate_manager.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aimili-vpngate-linux-x64
          path: dist/aimili-vpngate-linux-x64

  build-linux-aarch64:
    name: Build Linux aarch64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build binary
        run: |
          pyinstaller \
            --onefile \
            --name aimili-vpngate-linux-aarch64 \
            --hidden-import=vpn_utils \
            --hidden-import=proxy_server \
            --add-data "vpn_utils.py:." \
            --add-data "proxy_server.py:." \
            vpngate_manager.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aimili-vpngate-linux-aarch64
          path: dist/aimili-vpngate-linux-aarch64

  build-windows-x64:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build binary
        run: |
          pyinstaller `
            --onefile `
            --name aimili-vpngate-win64 `
            --hidden-import=vpn_utils `
            --hidden-import=proxy_server `
            --add-data "vpn_utils.py;." `
            --add-data "proxy_server.py;." `
            vpngate_manager.py
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aimili-vpngate-win64
          path: dist/aimili-vpngate-win64.exe

  build-android-aarch64:
    name: Build Android aarch64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyinstaller staticx
          sudo apt-get update && sudo apt-get install -y patchelf

      - name: Build binary with PyInstaller
        run: |
          pyinstaller \
            --onefile \
            --name aimili-vpngate-android-aarch64 \
            --hidden-import=vpn_utils \
            --hidden-import=proxy_server \
            --add-data "vpn_utils.py:." \
            --add-data "proxy_server.py:." \
            vpngate_manager.py

      - name: Create portable static binary with staticx
        run: |
          staticx dist/aimili-vpngate-android-aarch64 dist/aimili-vpngate-android-aarch64-portable
          chmod +x dist/aimili-vpngate-android-aarch64-portable

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aimili-vpngate-android-aarch64
          path: dist/aimili-vpngate-android-aarch64-portable

  release:
    name: Create GitHub Release
    needs: [build-linux-x64, build-linux-aarch64, build-windows-x64, build-android-aarch64]
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
      (github.event_name == 'workflow_dispatch' && inputs.tag != '')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/aimili-vpngate-linux-x64/aimili-vpngate-linux-x64 release/
          cp artifacts/aimili-vpngate-linux-aarch64/aimili-vpngate-linux-aarch64 release/
          cp artifacts/aimili-vpngate-win64/aimili-vpngate-win64.exe release/
          cp artifacts/aimili-vpngate-android-aarch64/aimili-vpngate-android-aarch64-portable release/
          cd release
          chmod +x aimili-vpngate-linux-x64 aimili-vpngate-linux-aarch64 aimili-vpngate-android-aarch64-portable
          tar czf aimili-vpngate-linux-x64.tar.gz aimili-vpngate-linux-x64
          tar czf aimili-vpngate-linux-aarch64.tar.gz aimili-vpngate-linux-aarch64
          tar czf aimili-vpngate-android-aarch64.tar.gz aimili-vpngate-android-aarch64-portable
          zip aimili-vpngate-win64.zip aimili-vpngate-win64.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/aimili-vpngate-linux-x64.tar.gz
            release/aimili-vpngate-linux-aarch64.tar.gz
            release/aimili-vpngate-android-aarch64.tar.gz
            release/aimili-vpngate-win64.zip
